<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Quoter Engine 🚀</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --bg: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a); 
            color: #fff; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--surface);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid var(--border);
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }

        .header { grid-column: 1 / -1; text-align: center; margin-bottom: 20px; }
        h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 10px; background: linear-gradient(90deg, #60a5fa, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p.subtitle { color: #94a3b8; font-size: 1.1rem; }

        .form-section { display: flex; flex-direction: column; gap: 15px; }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.9rem; font-weight: 600; color: #cbd5e1; }
        input, textarea, select {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            font-family: inherit;
            transition: all 0.2s;
        }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2); }

        .preview-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px dashed var(--border);
            border-radius: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            min-height: 400px;
            position: relative;
        }

        .preview-img { max-width: 100%; max-height: 100%; border-radius: 12px; display: none; }
        .placeholder { display: flex; flex-direction: column; align-items: center; gap: 15px; color: #64748b; }
        .placeholder i { font-size: 3rem; }

        button {
            margin-top: 10px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4); }
        button:active { transform: translateY(0); }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Quoter Engine v2 🔥</h1>
            <p class="subtitle">Generate premium Telegram quote stickers in seconds.</p>
        </div>

        <div class="form-section">
            <div class="input-group">
                <label>First Name</label>
                <input type="text" id="firstName" placeholder="Alexa" value="Alexa">
            </div>
            <div class="input-group">
                <label>Last Name</label>
                <input type="text" id="lastName" placeholder="Music" value="Music">
            </div>
            <div class="input-group">
                <label>Message Content</label>
                <textarea id="message" rows="4" placeholder="Type your quote here...">Welcome to the next generation of sticker making! ✨</textarea>
            </div>
            <div class="input-group">
                <label>Color ID (0-9)</label>
                <input type="number" id="nameColorId" min="0" max="9" value="2">
            </div>
            <div class="input-group">
                <label>Reply From (Optional)</label>
                <input type="text" id="replySender" placeholder="User Name">
            </div>
             <div class="input-group">
                <label>Reply Message (Optional)</label>
                <input type="text" id="replyMessage" placeholder="Previous message...">
            </div>
            <button id="generateBtn">Generate Sticker 🚀</button>
        </div>

        <div class="preview-section">
            <div class="loading" id="loading">
                <div class="spinner"></div>
            </div>
            <div class="placeholder" id="placeholder">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>
                </svg>
                <p>Generated image will appear here</p>
            </div>
            <img src="" alt="Preview" class="preview-img" id="previewImg">
        </div>
    </div>

    <script>
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const data = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                message: document.getElementById('message').value,
                nameColorId: parseInt(document.getElementById('nameColorId').value),
                replySender: document.getElementById('replySender').value,
                replyMessage: document.getElementById('replyMessage').value,
            };

            const placeholder = document.getElementById('placeholder');
            const previewImg = document.getElementById('previewImg');
            const loading = document.getElementById('loading');

            placeholder.style.display = 'none';
            previewImg.style.display = 'none';
            loading.style.display = 'block';

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (!response.ok) throw new Error('Generation failed');

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                
                previewImg.src = url;
                previewImg.style.display = 'block';
                loading.style.display = 'none';
            } catch (err) {
                alert('Error generating sticker: ' + err.message);
                placeholder.style.display = 'flex';
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
